{% extends "header.html" %} 

{% block content %}

<div class="modal_overlay" id="empModal">
    <div class="modal">
        <h2>Add Employee</h2>
        <form id="empForm">
            <div class="grid-form">
                <div class="form-group"><label>Employee ID</label><input type="text" id="e_id" required></div>
                <div class="form-group"><label>Employee Name</label><input type="text" id="e_name" required></div>
                <div class="form-group"><label>Position</label><input type="text" id="e_pos"></div>
                <div class="form-group"><label>Contact Number</label><input type="number" id="e_con"></div>
                <div class="form-group"><label>Sex</label><input type="text" id="e_sex"></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="e_dob"></div>
                <div class="form-group"><label>Date Hired</label><input type="date" id="e_hired"></div>
                <div class="form-group"><label>Salary Amount</label><input type="number" step="0.01" id="e_sal"></div>
                <div class="form-group full"><label>Address</label><input type="text" id="e_addr"></div>
            </div>
            <div class="modal_footer">
                <button type="button" class="btn-cancel" onclick="closeModal('empModal')">Cancel</button>
                <button type="submit" class="btn-add">Save</button>
            </div>
        </form>
    </div>
</div>

<div id="employees-sec" class="section active">
    <div class="header-flex">
        <h1>Receipt History</h1>
    </div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Receipt ID</th>
                    <th>Member ID</th>
                    <th>Employee ID</th>
                    <th>Discount</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="empTable">
                {% for r in reciept_list %}
                <tr>
                    <td>{{ r.receipt_id }}</td>
                    <td>{{ r.member_id }}</td>
                    <td>{{ r.employee_id }}</td>
                    <td>{{ r.discount }} </td>
                    <td>{{ r.date }} </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="9" style="text-align:center; color: var(--slate); padding: 30px;">
                        No Receipts Yet.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    function toggleForm() {
        const form = document.getElementById('catFormCard');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }
</script>

{% endblock %}

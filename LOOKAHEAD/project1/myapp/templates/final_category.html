{% extends "header.html" %} 
{% block content %}

<div id="category-sec" class="section active">
    <div class="header-flex">
        <h1>Category</h1>
        <button class="btn-add" onclick="toggleForm()">
            <i class="fas fa-plus"></i> Add Category
        </button>
    </div>

    <div id="catFormCard" class="card" style="display:none; padding: 25px; margin-bottom: 20px;">
        <h2 style="margin-bottom: 15px; font-size: 1rem;">New Category</h2>
        <form id="catForm" method = "POST">
            {% csrf_token %}
            <div class="grid-form">
                <div class="form-group">
                    <label>Category Name</label>
                    <input name = "categoryname" type="text" id="c_name" required>
                </div>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn-cancel" onclick="toggleForm()">Cancel</button>
                <button type="submit" class="btn-add">Save</button>
            </div>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Category ID</th>
                    <th>Category Name</th>
                </tr>
            </thead>
            <tbody id="catTable">
            {% for cg in categories %}
            <tr>
                <td>{{ cg.category_id }}</td>
                <td>{{ cg.category_name }}</td>
            </tr>
        {% endfor %}    
            </tbody>
        </table>
    </div>
</div>

<script>
    function toggleForm() {
        const form = document.getElementById('catFormCard');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }
    function closeModals() {
    document.querySelectorAll('.modal_overlay').forEach(m => m.style.display = 'none');
    }
</script>

{% endblock %}
